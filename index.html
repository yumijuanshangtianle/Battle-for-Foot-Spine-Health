<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>足脊健康保卫战</title>
  
  <!-- 引入 Tailwind CSS 库 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 相关库 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    
    /* 摇骰子动画 */
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .dice-rolling { animation: shake 0.5s infinite; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900">
  
  <div id="root"></div>

  <!-- React 游戏代码 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 数据定义 ---

    // 角色头像图片映射
    const AVATAR_MAP = {
      '课代表': '1 课代表.png',
      '足球小将': '2 足球小将.png',
      '游戏爱好者': '5 电竞爱好者.png',
      '活力运动员': '6 短跑员.png',
      '书包超重者': '3 书包超重同学.png',
      '舞蹈生': '4 舞蹈生.png',
      '美术生': '7 美术生.png',
      '值日班长': '8 值日生.png'
    };

    // 0-49格 对应地图上的位置百分比
    const CELL_POSITIONS = [
      { x: 10, y: 15 }, { x: 10, y: 25 }, { x: 10, y: 35 }, { x: 11, y: 45 }, { x: 11, y: 55 }, // 0-4
      { x: 12, y: 65 }, { x: 14, y: 75 }, { x: 16, y: 83 }, { x: 22, y: 88 }, { x: 30, y: 86 }, // 5-9
      { x: 34, y: 78 }, { x: 35, y: 68 }, { x: 36, y: 58 }, { x: 36, y: 48 }, { x: 35, y: 38 }, // 10-14
      { x: 33, y: 28 }, { x: 32, y: 18 }, { x: 35, y: 10 }, { x: 42, y: 9 },  { x: 48, y: 14 }, // 15-19
      { x: 52, y: 22 }, { x: 53, y: 32 }, { x: 53, y: 42 }, { x: 52, y: 52 }, { x: 50, y: 62 }, // 20-24
      { x: 48, y: 72 }, { x: 50, y: 80 }, { x: 56, y: 86 }, { x: 64, y: 85 }, { x: 70, y: 78 }, // 25-29
      { x: 73, y: 68 }, { x: 74, y: 58 }, { x: 74, y: 48 }, { x: 73, y: 38 }, { x: 71, y: 28 }, // 30-34
      { x: 69, y: 18 }, { x: 72, y: 10 }, { x: 79, y: 9 },  { x: 86, y: 13 }, { x: 90, y: 21 }, // 35-39
      { x: 92, y: 31 }, { x: 92, y: 41 }, { x: 91, y: 51 }, { x: 90, y: 61 }, { x: 88, y: 71 }, // 40-44
      { x: 85, y: 80 }, { x: 86, y: 88 }, { x: 92, y: 92 }, { x: 96, y: 85 }, { x: 95, y: 75 }  // 45-49
    ];

    const ROLES = [
      { id: 'r1', name: '课代表', desc: '被动：回合结束时有几率触发额外答题机会，答对+2脊柱。' },
      { id: 'r2', name: '足球小将', desc: '主动：每局游戏可免疫1次风险事件。' },
      { id: 'r3', name: '游戏爱好者', desc: '被动：受“久坐疲劳”或“低头玩手机”影响时，扣分减半。' },
      { id: 'r4', name: '活力运动员', desc: '被动：出牌消耗的足部值减少1点（即仅扣1点）。' },
      { id: 'r5', name: '书包超重者', desc: '被动：免疫“单肩书包”和“书包超重”风险。' },
      { id: 'r6', name: '舞蹈生', desc: '被动：使用姿势卡时，额外恢复1点脊柱健康币。' },
      { id: 'r7', name: '美术生', desc: '被动：知识问答答对时，额外获得1点脊柱健康币。' },
      { id: 'r8', name: '值日班长', desc: '被动：回合结束时，恢复1点足部值。' },
    ];

    const CARDS_DATA = {
      postures: [
        { name: '端正坐姿', effect: { spine: 2, foot: 0 }, count: 1 },
        { name: '正确拉伸姿势', effect: { spine: 2, foot: 2 }, count: 1 },
        { name: '阅读姿势', effect: { spine: 2, foot: 0 }, count: 1 },
        { name: '睡眠正确姿势', effect: { spine: 2, foot: 2 }, count: 1 },
        { name: '勾脚绷脚运动', effect: { spine: 0, foot: 4 }, count: 1 },
        { name: '正确站姿', effect: { spine: 2, foot: 0 }, count: 1 },
      ],
      risks: [
        { name: '低头玩手机', effect: { spine: -4, foot: 0 }, count: 1 },
        { name: '久坐疲劳', effect: { spine: -2, foot: -1 }, count: 1 },
        { name: '耸肩驼背', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '翘腿悬空', effect: { spine: 0, foot: -2 }, count: 1 },
        { name: '单肩书包', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '低头走路', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '猛弯腰捡物', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '趴桌阅读', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '伏案写字', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '趴睡侧歪', effect: { spine: -4, foot: 0 }, count: 1 },
        { name: '穿不合适鞋子', effect: { spine: 0, foot: -4 }, count: 1 },
        { name: '无课间活动', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '蹲姿错误', effect: { spine: 0, foot: -2 }, count: 1 },
        { name: '歪坐不均', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '站姿倾斜', effect: { spine: -2, foot: 0 }, count: 1 },
        { name: '日常磨损', effect: { spine: -2, foot: -1 }, count: 1 },
        { name: '书包超重', effect: { spine: -2, foot: -1 }, count: 1 },
      ],
      items: [
        { name: '靠垫', desc: '脊柱+2', effect: { spine: 2, foot: 0 }, count: 3 },
        { name: '筋膜球', desc: '足部+2', effect: { spine: 0, foot: 2 }, count: 3 },
        { name: '休息室', desc: '足部+3', effect: { spine: 0, foot: 3 }, count: 2 },
        { name: '肉蛋奶套餐', desc: '脊柱+1, 足部+1', effect: { spine: 1, foot: 1 }, count: 3 },
        { name: '护眼镜', desc: '脊柱+2', effect: { spine: 2, foot: 0 }, count: 2 },
        { name: '行动卡', desc: '重新洗牌', effect: { spine: 0, foot: 0 }, special: 'shuffle', count: 2 },
        { name: '运动手环', desc: '触发答题', effect: { spine: 0, foot: 0 }, special: 'trivia', count: 2 },
        { name: '顶包卡', desc: '将风险转移给他人', effect: { spine: 0, foot: 0 }, special: 'transfer', count: 3 }
      ],
      trivia: [
        { name: '知识问答卡', effect: { spine: 0, foot: 0 }, count: 10 }
      ]
    };

    // 录入全部 12 道题库
    const TRIVIA_QUESTIONS = [
      { id: 1, q: '正常的脊柱有多少个椎骨？', options: ['A. 26个', 'B. 33个'], correct: 1 },
      { id: 2, q: '正确的坐姿应该是什么样的？', options: ['A. 弯腰驼背，双腿交叉', 'B. 背部挺直，双脚平放在地面，膝盖与髋部平行'], correct: 1 },
      { id: 3, q: '长时间低头看手机可能导致什么健康问题？', options: ['A. “手机颈”或颈椎问题', 'B. 视力提高'], correct: 0 },
      { id: 4, q: '保持良好的站姿有哪些要点？', options: ['A. 重心全放在一只脚上', 'B. 双脚分开与肩同宽，重心均匀分布，背部挺直'], correct: 1 },
      { id: 5, q: '足弓的作用是什么？', options: ['A. 吸收冲击，提供稳定性和支撑力', 'B. 没有实际作用'], correct: 0 },
      { id: 6, q: '每天至少应该进行多少分钟的中等强度运动以促进健康？', options: ['A. 30分钟', 'B. 至少150分钟'], correct: 1 },
      { id: 7, q: '哪些食物对骨骼健康有益？', options: ['A. 碳酸饮料', 'B. 富含钙和维生素D的食物（如奶制品、深绿色蔬菜）'], correct: 1 },
      { id: 8, q: '如何预防脚气？', options: ['A. 保持脚部干燥和清洁，定期更换袜子', 'B. 经常穿不透气的湿鞋'], correct: 0 },
      { id: 9, q: '睡眠时最推荐的睡姿是什么？', options: ['A. 趴着睡', 'B. 侧卧睡姿'], correct: 1 },
      { id: 10, q: '什么是“坐骨神经痛”？', options: ['A. 坐骨神经受压或刺激引起的疼痛', 'B. 肚子痛'], correct: 0 },
      { id: 11, q: '站立时，身体的重心应该主要放在脚的哪个部位？', options: ['A. 均匀分布在双脚，避免重心偏向一侧', 'B. 偏向一侧'], correct: 0 },
      { id: 12, q: '跳绳时应该用前脚掌还是全脚掌落地？', options: ['A. 全脚掌', 'B. 前脚掌落地，利用足弓缓冲'], correct: 1 },
    ];

    function App() {
      const [gameState, setGameState] = useState('menu'); // menu, playing, gameover
      const [playerCount, setPlayerCount] = useState(2);
      const [players, setPlayers] = useState([]);
      const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
      const [deck, setDeck] = useState([]);
      const [logs, setLogs] = useState([]);
      const [turnPhase, setTurnPhase] = useState('draw'); // draw, action
      
      const [modal, setModal] = useState(null);
      const [showLibrary, setShowLibrary] = useState(false); // 牌库显示状态
      const [libraryTab, setLibraryTab] = useState('roles'); // 牌库当前标签页

      // 摇骰子动画状态
      const [isRolling, setIsRolling] = useState(false);
      const [diceNumber, setDiceNumber] = useState(1);

      const endLogRef = useRef(null);

      useEffect(() => {
        endLogRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [logs]);

      const addLog = (msg) => {
        setLogs(prev => [...prev, msg]);
      };

      const buildDeck = () => {
        let nonRisks = [];
        let risks = [];

        const addCards = (source, type, target) => {
          source.forEach(c => {
            for (let i = 0; i < c.count; i++) {
              target.push({ ...c, type, id: Math.random().toString(36).substr(2, 9) });
            }
          });
        };

        addCards(CARDS_DATA.postures, 'posture', nonRisks);
        addCards(CARDS_DATA.items, 'item', nonRisks);
        addCards(CARDS_DATA.trivia, 'trivia', nonRisks);
        addCards(CARDS_DATA.risks, 'risk', risks);

        nonRisks.sort(() => Math.random() - 0.5);
        risks.sort(() => Math.random() - 0.5);

        return { nonRisks, risks };
      };

      const startGame = () => {
        const { nonRisks, risks } = buildDeck();
        let currentDeck = [...nonRisks];
        
        const shuffledRoles = [...ROLES].sort(() => Math.random() - 0.5);
        const initialPlayers = [];

        for (let i = 0; i < playerCount; i++) {
          const hand = currentDeck.splice(0, 4);
          initialPlayers.push({
            id: i,
            name: `玩家 ${i + 1}`,
            role: shuffledRoles[i],
            foot: 25,
            spine: 50,
            hand: hand,
            isOut: false,
            abilities: { footballUsed: false }
          });
        }

        let finalDeck = [...currentDeck, ...risks].sort(() => Math.random() - 0.5);

        setPlayers(initialPlayers);
        setDeck(finalDeck);
        setCurrentPlayerIdx(0);
        setTurnPhase('draw');
        setLogs(['游戏开始！每位玩家获得4张初始手牌。']);
        setGameState('playing');
      };

      const updatePlayer = (idx, changes) => {
        setPlayers(prev => {
          const newPlayers = [...prev];
          let p = { ...newPlayers[idx], ...changes };
          if (p.foot <= 0 && !p.isOut) {
            p.isOut = true;
            p.foot = 0;
            addLog(`❌ ${p.name} 的足部值耗尽，已退出游戏！`);
          }
          newPlayers[idx] = p;
          return newPlayers;
        });
      };

      useEffect(() => {
        if (gameState !== 'playing') return;
        const activePlayers = players.filter(p => !p.isOut);
        if (activePlayers.length === 0 || deck.length === 0) {
          setGameState('gameover');
        } else if (players[currentPlayerIdx].isOut) {
          handleEndTurn();
        }
      }, [players, deck, currentPlayerIdx, gameState]);

      const handleDraw = () => {
        const player = players[currentPlayerIdx];
        if (player.foot <= 1) {
          updatePlayer(currentPlayerIdx, { foot: 0 });
          return;
        }

        updatePlayer(currentPlayerIdx, { foot: player.foot - 1 });
        addLog(`🃏 ${player.name} 消耗1点足部值抽牌。`);

        if (deck.length === 0) return;
        const newDeck = [...deck];
        const drawnCard = newDeck.pop();
        setDeck(newDeck);

        if (drawnCard.type === 'risk') {
          setModal({ type: 'risk', card: drawnCard });
        } else {
          addLog(`📥 ${player.name} 获得卡牌: ${drawnCard.name}`);
          const newHand = [...player.hand, drawnCard];
          updatePlayer(currentPlayerIdx, { hand: newHand });
          setTurnPhase('action');
        }
      };

      const resolveRisk = (useAbility = false) => {
        const player = players[currentPlayerIdx];
        const card = modal.card;
        setModal(null);
        setTurnPhase('action');

        if (useAbility && player.role.name === '足球小将') {
          updatePlayer(currentPlayerIdx, { 
            abilities: { ...player.abilities, footballUsed: true } 
          });
          addLog(`🛡️ ${player.name} 发动【足球小将】技能，完全免疫了 ${card.name}！`);
          return;
        }

        if (player.role.name === '书包超重者' && (card.name === '单肩书包' || card.name === '书包超重')) {
          addLog(`🛡️ ${player.name} 发动【书包超重者】被动，免疫了 ${card.name}！`);
          return;
        }

        let spineMod = card.effect.spine;
        let footMod = card.effect.foot;

        if (player.role.name === '游戏爱好者' && (card.name === '久坐疲劳' || card.name === '低头玩手机')) {
          spineMod = Math.ceil(spineMod / 2);
          footMod = Math.ceil(footMod / 2);
          addLog(`🎮 ${player.name} 发动【游戏爱好者】被动，${card.name} 伤害减半！`);
        }

        addLog(`⚠️ ${player.name} 遭受风险 ${card.name} (脊柱${spineMod}, 足部${footMod})`);
        
        updatePlayer(currentPlayerIdx, { 
          spine: player.spine + spineMod,
          foot: player.foot + footMod
        });
      };

      const executeTransfer = (targetIdx, cardIdx) => {
        const player = players[currentPlayerIdx];
        const targetPlayer = players[targetIdx];
        const card = modal.card;

        setModal(null);
        setTurnPhase('action');

        const newHand = [...player.hand];
        newHand.splice(cardIdx, 1);
        
        addLog(`🃏 ${player.name} 打出【顶包卡】，把 [${card.name}] 的风险转移给了 ${targetPlayer.name}！`);

        let spineMod = card.effect.spine;
        let footMod = card.effect.foot;
        
        if (targetPlayer.role.name === '书包超重者' && (card.name === '单肩书包' || card.name === '书包超重')) {
          spineMod = 0;
          footMod = 0;
          addLog(`🛡️ ${targetPlayer.name} 发动【书包超重者】被动，免疫了转移来的 ${card.name}！`);
        } else if (targetPlayer.role.name === '游戏爱好者' && (card.name === '久坐疲劳' || card.name === '低头玩手机')) {
          spineMod = Math.ceil(spineMod / 2);
          footMod = Math.ceil(footMod / 2);
          addLog(`🎮 ${targetPlayer.name} 发动【游戏爱好者】被动，转移来的 ${card.name} 伤害减半！`);
        } else {
          addLog(`⚠️ ${targetPlayer.name} 无奈承受了转移来的风险 (脊柱${spineMod}, 足部${footMod})`);
        }

        setPlayers(prev => {
            const newPlayers = [...prev];
            newPlayers[currentPlayerIdx] = { ...newPlayers[currentPlayerIdx], hand: newHand };
            let t = { ...newPlayers[targetIdx] };
            t.spine += spineMod;
            t.foot += footMod;
            if (t.foot <= 0 && !t.isOut) {
                t.isOut = true;
                t.foot = 0;
                addLog(`❌ ${t.name} 的足部值耗尽，已退出游戏！`);
            }
            newPlayers[targetIdx] = t;
            return newPlayers;
        });
      };

      // 摇骰子逻辑
      const rollDiceForTrivia = () => {
        setIsRolling(true);
        let rolls = 0;
        const rollInterval = setInterval(() => {
          setDiceNumber(Math.floor(Math.random() * 12) + 1);
          rolls++;
          if (rolls > 15) { // 滚动15次后停止
            clearInterval(rollInterval);
            setIsRolling(false);
            const finalIndex = Math.floor(Math.random() * 12);
            setDiceNumber(finalIndex + 1);
            
            // 停顿一秒后进入真实答题界面
            setTimeout(() => {
               setModal({ 
                 type: 'trivia', 
                 question: TRIVIA_QUESTIONS[finalIndex], 
                 playCost: modal.playCost, 
                 cardIdx: modal.cardIdx 
               });
            }, 1000);
          }
        }, 80);
      };

      const resolveTrivia = (isCorrect) => {
        const player = players[currentPlayerIdx];
        const cost = modal.playCost || 0;
        const cardIdx = modal.cardIdx;
        
        setModal(null);
        setTurnPhase('action');

        let reward = 2;
        if (player.role.name === '美术生') {
          reward = 3;
          addLog(`🎨 ${player.name} 发动【美术生】被动，答题额外+1分！`);
        }

        let newSpine = player.spine;
        if (isCorrect) {
          addLog(`✅ ${player.name} 答对了健康知识！脊柱 +${reward}`);
          newSpine += reward;
        } else {
          addLog(`❌ ${player.name} 答错了，脊柱 -1`);
          newSpine -= 1;
        }

        let newFoot = player.foot - cost;
        let newHand = [...player.hand];

        if (cardIdx !== undefined) {
          newHand.splice(cardIdx, 1);
        }

        updatePlayer(currentPlayerIdx, { 
          spine: newSpine, 
          foot: newFoot,
          hand: newHand
        });
      };

      const handlePlayCard = (cardIdx) => {
        const player = players[currentPlayerIdx];
        const cost = player.role.name === '活力运动员' ? 1 : 2;
        const card = player.hand[cardIdx];

        if (card.name === '顶包卡') {
          alert('【顶包卡】是一张反应牌，无需消耗足部值。它只能在你抽到【风险卡】时，在弹出的警告框中点击使用哦！');
          return;
        }

        if (player.foot <= cost) {
          alert(`足部值不足以出牌（需要 ${cost} 点）！`);
          return;
        }

        // 打出问答卡，进入摇骰子阶段
        if (card.type === 'trivia' || card.special === 'trivia') {
          addLog(`🃏 ${player.name} 消耗 ${cost} 点足部值，打出 [${card.name}]。`);
          setModal({ type: 'dice', playCost: cost, cardIdx });
          return;
        }
        
        let newSpine = player.spine + card.effect.spine;
        let newFoot = player.foot - cost + card.effect.foot;

        if (player.role.name === '舞蹈生' && card.type === 'posture') {
          newSpine += 1;
          addLog(`💃 ${player.name} 发动【舞蹈生】被动，姿势卡额外恢复1点脊柱！`);
        }

        addLog(`🃏 ${player.name} 消耗 ${cost} 点足部值，打出 [${card.name}]。`);

        if (card.special === 'shuffle') {
          const shuffledDeck = [...deck].sort(() => Math.random() - 0.5);
          setDeck(shuffledDeck);
          addLog(`🔀 [行动卡] 效果触发：剩余牌堆已被重新洗牌！`);
        }

        const newHand = [...player.hand];
        newHand.splice(cardIdx, 1);

        updatePlayer(currentPlayerIdx, {
          hand: newHand,
          spine: newSpine,
          foot: newFoot
        });
      };

      const handleEndTurn = () => {
        const player = players[currentPlayerIdx];
        
        if (!player.isOut) {
          if (player.role.name === '值日班长') {
             updatePlayer(currentPlayerIdx, { foot: player.foot + 1 });
             addLog(`🧹 ${player.name} 发动【值日班长】被动，回合结束恢复1点足部值。`);

             updatePlayer(currentPlayerIdx, { spine: player.spine + 1 });
          }

        let nextIdx = (currentPlayerIdx + 1) % playerCount;
        let loopCount = 0;
        while (players[nextIdx]?.isOut && loopCount < playerCount) {
          nextIdx = (nextIdx + 1) % playerCount;
          loopCount++;

        setCurrentPlayerIdx(nextIdx);
        setTurnPhase('draw');

                        <div className="flex flex-col gap-1 text-sm pl-4">
                          {q.options.map((opt, i) => (

                  {logs.map((log, i) => <div key={i}>{log}</div>)}
                  <div ref={endLogRef} />

              </div>
            </div>

            {/* ----- 右侧栏：占据剩余所有空间 ----- */}
            <div className="flex-1 flex flex-col w-full bg-green-50 p-2 md:p-4 h-auto md:h-screen overflow-y-auto">
              <div className="bg-white rounded-2xl shadow-lg p-4 mb-2 flex-1 flex flex-col min-h-max">
                <div className="flex justify-between items-center border-b pb-2 mb-2 pr-20">
                  <div>
                    <h2 className="text-xl font-bold text-gray-800">轮到 {currentPlayer.name}</h2>
                    <div className="text-purple-600 font-medium text-xs mt-1 flex items-start gap-1">
                      ℹ️ {currentPlayer.role.name}：{currentPlayer.role.desc}
                    </div>
                  </div>
                </div>

                {/* 游戏地图区域：增加最大高度限制，防止把下面内容挤出屏幕 */}
                <div className="w-full flex justify-center mb-2">
                  <div className="relative w-full rounded-xl overflow-hidden shadow-inner border-2 border-green-300 bg-green-100" 
                       style={{ aspectRatio: '16/11', maxHeight: '52vh', maxWidth: 'calc(52vh * 16 / 11)' }}>

                    {players.map((p, idx) => {

                      <span className="text-2xl">⚡</span>

            </div>

            {/* 常规风险弹窗 */}
            {modal?.type === 'risk' && !modal.selectingTarget && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">

                  <p className="text-red-600 font-bold text-xl mb-4">{modal.card.name}</p>

            {modal?.type === 'risk' && modal.selectingTarget && (
              <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">

                          <img src={AVATAR_MAP[p.role.name]} className="w-6 h-6 rounded-full border border-white" />

                    <button

                        className="w-full text-left bg-gray-50 hover:bg-yellow-50 border-2 border-gray-200 hover:border-yellow-400 p-4 rounded-xl transition text-gray-800 font-bold text-base"

          return b.foot - a.foot;

        const winner = sorted[0];

        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-gray-50 p-6">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden text-center p-8 border-t-8 border-green-500">
              <div className="text-7xl mb-4">🏆</div>
              <h1 className="text-3xl font-black mb-2 text-gray-800">游戏结束！</h1>
              <p className="text-gray-500 mb-6 font-medium">牌堆已耗尽 或 仅剩一名玩家</p>

              <div className="bg-gradient-to-br from-yellow-100 to-yellow-200 text-yellow-900 p-6 rounded-2xl mb-8 shadow-inner">
                <p className="text-sm font-bold uppercase mb-2 tracking-widest opacity-80">本局健康守护者</p>
                <div className="flex justify-center mb-3">
                  <img src={AVATAR_MAP[winner.role.name]} className="w-20 h-20 rounded-full border-4 border-white shadow-lg object-cover" alt="avatar" />
                </div>
                <p className="text-3xl font-black mb-1">{winner.name}</p>
                <p className="text-sm font-bold">{winner.role.name} | 最终健康币: {winner.spine}</p>
              </div>

              <div className="space-y-3 mb-8 text-left">
                {sorted.map((p, i) => (
                  <div key={p.id} className="flex justify-between items-center p-4 bg-gray-50 border rounded-xl shadow-sm">
                    <span className="font-bold text-gray-700 flex items-center gap-2">
                      <span className="text-gray-400 font-black italic">#{i+1}</span> {p.name}
                    </span>
                    <div className="text-sm font-bold text-gray-600 flex gap-4">
                      <span className="text-green-600">🪙 {p.spine}</span>
                      <span className="text-blue-600">⚡ {p.foot}</span>
                    </div>
                  </div>
                ))}
              </div>

              <button 
                onClick={() => setGameState('menu')}
                className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition text-lg"
              >
                返回主菜单
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="font-sans antialiased text-gray-900 selection:bg-green-200">
          {gameState === 'menu' && renderMenu()}
          {gameState === 'playing' && renderGame()}
          {gameState === 'gameover' && renderGameOver()}
          {/* 渲染全局牌库模块 */}
          {renderLibrary()}
        </div>
      );
    }

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
